<script nonce="{{ request.csp_nonce }}">
    // Alpine.js data for mobile menu state, if not already globally available
    if (typeof Alpine !== 'undefined' && !Alpine.data('mobileSettingsMenuOpen')) {
        document.addEventListener('alpine:initializing', () => {
            Alpine.data('mobileSettingsMenuOpen', () => ({
                mobileSettingsMenuOpen: false
            }))
        })

</script>
