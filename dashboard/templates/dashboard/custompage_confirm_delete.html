{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-xl">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-trash"></i> Delete Custom Page</h2>
    <form method="post" class="bg-white rounded-xl shadow p-6 flex flex-col gap-4">
        {% csrf_token %}
        <p class="text-lg">Are you sure you want to delete <span class="font-semibold">{{ page.title }}</span>?</p>
        <div class="flex gap-4 mt-4">
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 flex items-center gap-2"><i class="fa-solid fa-trash"></i> Confirm Delete</button>
            <a href="/dashboard/custompages/" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
