{% load static %}
<div class="flex flex-col gap-y-4">
    <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-home w-5 h-5"></i>
        <span>Dashboard</span>
    </a>

    <h3 class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider">Content</h3>
    <a href="{% url 'vpn_list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if 'dashboard/vpns/' in request.path or 'vpn_' in request.resolver_match.url_name %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-shield-alt w-5 h-5"></i>
        <span>VPNs</span>
    </a>
    <a href="{% url 'category_list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if request.resolver_match.app_name == 'categories' %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-tags w-5 h-5"></i>
        <span>Categories</span>
    </a>
    <a href="{% url 'coupons:list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium {% if 'coupons' in request.resolver_match.view_name or 'coupons/' in request.path or 'coupons:' in request.resolver_match.view_name or 'coupons' in request.resolver_match.app_name or 'coupons' in request.resolver_match.namespaces or 'coupons' in request.resolver_match.app_names %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %} transition-colors">
        <i class="fa-solid fa-ticket-alt w-5 h-5"></i>
        <span>Coupons</span>
    </a>
    <a href="{% url 'blogpost_list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if request.resolver_match.app_name == 'blog' %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-newspaper w-5 h-5"></i>
        <span>Blog Posts</span>
    </a>
    <a href="{% url 'custompage_list' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if request.resolver_match.app_name == 'custompages' %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-file-alt w-5 h-5"></i>
        <span>Custom Pages</span>
    </a>

    <h3 class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4">Site</h3>
    <a href="{% url 'settings:settings_edit' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if 'settings/' in request.path and 'backup' not in request.path %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-cog w-5 h-5"></i>
        <span>Site Settings</span>
    </a>
    <a href="{% url 'settings:backup:backup_dashboard' %}" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors {% if 'settings/backup/' in request.path %}bg-indigo-100 text-indigo-700{% else %}text-slate-600 hover:bg-indigo-50 hover:text-indigo-600{% endif %}">
        <i class="fa-solid fa-database w-5 h-5"></i>
        <span>Gerenciamento de Backups</span>
    </a>
    
    <div class="mt-auto pt-4 border-t border-gray-200">
        <form method="post" action="{% url 'logout' %}" class="w-full">
            {% csrf_token %}
            <button type="submit" class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-slate-600 hover:bg-red-50 hover:text-red-600 transition-colors w-full text-left">
                <i class="fa-solid fa-sign-out-alt w-5 h-5"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>
</div>
