{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto px-4 py-16 max-w-xl">
    <div class="bg-white rounded-xl shadow p-8 flex flex-col items-center">
        <h2 class="text-2xl font-bold mb-6 text-red-600 flex items-center gap-2"><i class="fa-solid fa-trash"></i> Delete Category</h2>
        <p class="mb-8 text-gray-700 text-center">Are you sure you want to delete the category <span class="font-bold">{{ category.name }}</span>? This action cannot be undone.</p>
        <form method="post" class="flex gap-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 flex items-center gap-2"><i class="fa-solid fa-trash"></i> Delete</button>
            <a href="/dashboard/categories/" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
