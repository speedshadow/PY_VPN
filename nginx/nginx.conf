#         root /var/www/certbot;
#     }
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# Servidor principal
server {
    listen 80;
    # O server_name será substituído pelo script de setup
    server_name localhost;

    client_max_body_size 100M;

    # Configurações de Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # Servir ficheiros estáticos diretamente do volume
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Servir ficheiros de media diretamente do volume
    location /media/ {
        alias /app/media/;
    }

    # Configuração para o desafio do Certbot (para renovação)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Bloco de proxy principal - será movido para o HTTPS
    location / {
        # O script irá substituir este bloco por um redirecionamento
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# O script irá adicionar o bloco do servidor para a porta 443 (HTTPS) aqui abaixo.
